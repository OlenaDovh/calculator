<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Калькулятор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Django Calculator</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="mb-4 text-center">Калькулятор</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <input type="number" step="any" name="a" class="form-control" placeholder="Перше число" required>
            </div>

            <div class="mb-3">
                <input type="number" step="any" name="b" class="form-control" placeholder="Друге число" required>
            </div>

            <div class="mb-3">
                <select name="operation" class="form-select">
                    <option value="add">Додавання (+)</option>
                    <option value="sub">Віднімання (-)</option>
                    <option value="mul">Множення (*)</option>
                    <option value="div">Ділення (/)</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">Обчислити</button>
        </form>

        {% if result is not None %}
            <div class="alert alert-info mt-4 text-center">
                Результат: {{ result }}
            </div>
        {% endif %}
    </div>
</div>

</body>
</html>
